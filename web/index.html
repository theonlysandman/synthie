<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthie — Voice</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header { margin: 2rem 0 1rem; text-align: center; }
    h1 { margin: 0; font-size: 1.6rem; }
    .sub { color: #8b949e; font-size: 0.9rem; margin-top: 0.25rem; }
    #status {
      margin: 0.5rem 0 1.5rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      background: #21262d;
      color: #8b949e;
    }
    #status.live { background: #1f6f3f; color: #d4ffe0; }
    #status.error { background: #6e2330; color: #ffd4dc; }
    button {
      font-size: 1rem;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.06s ease, background 0.2s ease;
    }
    button:active { transform: scale(0.97); }
    #startBtn { background: #2ea043; color: white; }
    #pauseBtn { background: #d29922; color: #1c1407; }
    #stopBtn { background: #da3633; color: white; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .hidden { display: none !important; }
    #controls { display: flex; gap: 0.75rem; justify-content: center; }
    #mic {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 1.5rem 0; background: #161b22;
      border: 3px solid #30363d;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    #mic.speaking { border-color: #2ea043; box-shadow: 0 0 30px rgba(46,160,67,0.5); }
    #mic.listening { border-color: #1f6feb; box-shadow: 0 0 30px rgba(31,111,235,0.4); }
    #log {
      width: min(680px, 92vw);
      margin-top: 1.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem;
      height: 280px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .you { color: #58a6ff; }
    .synthie { color: #3fb950; }
    .meta { color: #6e7681; font-style: italic; }
    .row { margin-bottom: 0.5rem; white-space: pre-wrap; }
    #diag {
      width: min(680px, 92vw);
      margin-top: 0.6rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.75rem;
      color: #8b949e;
      background: #0b0f14;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎙️ Synthie</h1>
    <div class="sub">Synthetic customer — live voice</div>
  </header>

  <div id="status">Idle</div>
  <div id="mic">🎤</div>

  <div id="controls">
    <button id="startBtn">Start conversation</button>
    <button id="pauseBtn" class="hidden">Pause conversation</button>
    <button id="stopBtn" class="hidden">Stop conversation</button>
  </div>

  <div id="log"></div>
  <div id="diag">audio diagnostics will appear here…</div>

  <script src="/web/app.js"></script>
</body>
</html>
